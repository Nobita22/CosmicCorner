<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>YouTube Uploader</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px">
  <h2>YouTube Uploader</h2>

  <label>Description:</label><br />
  <textarea id="desc" rows="2" style="width:100%"></textarea><br /><br />

  <label>Tags (comma‑separated):</label><br />
  <input id="tags" type="text" style="width:100%" placeholder="fun, travel, tech" /><br /><br />

  <label>Time (YYYY-MM-DD HH:MM):</label><br />
  <input id="dt" type="text" style="width:100%" placeholder="2026-03-01 14:00" /><br /><br />

  <button id="send" disabled>Send to bot</button>

  <script>
    const desc   = document.getElementById("desc");
    const tags   = document.getElementById("tags");
    const dt     = document.getElementById("dt");
    const send   = document.getElementById("send");

    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    function updateButton() {
      if (desc.value.trim() && tags.value.trim() && dt.value.trim()) {
        send.disabled = false;
      } else {
        send.disabled = true;
      }
    }
    desc.addEventListener("input", updateButton);
    tags.addEventListener("input", updateButton);
    dt.addEventListener("input", updateButton);
    updateButton();

    send.addEventListener("click", () => {
      const data = {
        description: desc.value.trim(),
        tags: tags.value.split(",").map(t => t.trim()),
        scheduled_at: dt.value.trim(),
      };
      Telegram.WebApp.sendData(JSON.stringify(data));
      Telegram.WebApp.close();
    });
  </script>
</body>
</html>
