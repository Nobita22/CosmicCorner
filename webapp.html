<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Download YouTube Shorts</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, button { font-size: 16px; margin: 6px 0; }
    .result { margin-top: 20px; padding: 10px; background: #f0f0f0; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Download YouTube Shorts</h1>

  <form method="post" action="/download">
    <p>
      <label>YouTube Shorts link or channel:</label><br>
      <input type="text" name="url" placeholder="https://youtube.com/@channel/shorts or https://youtube.com/shorts/..." style="width: 400px;">
    </p>
    <p>
      <button type="submit">Download</button>
    </p>
  </form>

  {% if log %}
    <div class="result">
      {{ log }}
    </div>
  {% endif %}
</body>
</html>
