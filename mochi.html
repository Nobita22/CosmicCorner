<!DOCTYPE html>
<html>
<head>
  <title>ESP32 BLE Chat</title>
</head>
<body>
  <h1>ESP32 BLE Communication</h1>
  <button id="connect">Connect</button>
  <input id="msgInput" placeholder="Type message">
  <button id="send">Send</button>
  <pre id="log"></pre>

  <script>
    let device;
    let characteristic;

    document.getElementById('connect').onclick = async () => {
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{name: 'ESP32-BLE'}],
          optionalServices: ['12345678-1234-1234-1234-1234567890ab']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('12345678-1234-1234-1234-1234567890ab');
        characteristic = await service.getCharacteristic('abcd1234-5678-1234-5678-abcdef123456');

        // Start notifications
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', (event) => {
          const value = new TextDecoder().decode(event.target.value);
          document.getElementById('log').textContent += "ESP32: " + value + "\n";
        });

        document.getElementById('log').textContent += "Connected!\n";
      } catch(error){
        console.log(error);
      }
    }

    document.getElementById('send').onclick = async () => {
      const msg = document.getElementById('msgInput').value;
      if(characteristic){
        await characteristic.writeValue(new TextEncoder().encode(msg));
        document.getElementById('log').textContent += "You: " + msg + "\n";
      }
    }
  </script>
</body>
</html>
