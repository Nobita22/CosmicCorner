<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Digital Pet</title>
<style>
body { font-family:sans-serif; background:#111; color:white; text-align:center;}
button { padding:15px; margin:8px; font-size:16px; border:none; border-radius:10px; cursor:pointer; background:#222; color:white;}
#stats { margin-top:20px; text-align:left; display:inline-block;}
#avatar { margin:20px auto; width:128px; height:64px; border:2px solid #fff;}
</style>
</head>
<body>
<h2>My Digital Pet</h2>
<div id="avatar">👀</div>
<input id="nameInput" placeholder="Enter pet name"/>
<button onclick="setName()">Set Name</button><br>
<button onclick="sendCommand('FEED')">Feed 🍎</button>
<button onclick="sendCommand('PET')">Pet 🖐</button>
<button onclick="gift()">Gift 🎁</button>
<button onclick="talk()">Talk 💬</button>
<button onclick="playGame()">Play 🎮</button>
<button onclick="connect()">Connect</button>

<div id="stats"></div>

<script>
let device, characteristic;
async function connect(){
  device=await navigator.bluetooth.requestDevice({filters:[{name:'ESP32_PET'}],optionalServices:['12345678-1234-1234-1234-1234567890ab']});
  const server=await device.gatt.connect();
  const service=await server.getPrimaryService('12345678-1234-1234-1234-1234567890ab');
  characteristic=await service.getCharacteristic('abcd1234-1234-1234-1234-abcdef123456');
  characteristic.addEventListener('characteristicvaluechanged',handleNotify);
  await characteristic.startNotifications();
  sendCommand('TIME:'+Math.floor(Date.now()/1000));
  sendCommand('STATUS');
}
function sendCommand(cmd){ if(characteristic) characteristic.writeValue(new TextEncoder().encode(cmd)); }
function handleNotify(event){
  let val=new TextDecoder().decode(event.target.value);
  try{
    let data=JSON.parse(val);
    document.getElementById('stats').innerHTML=
      "Name: "+data.name+"<br>Level: "+data.level+"<br>XP: "+data.xp+"<br>Happiness: "+data.happiness+"<br>Hunger: "+data.hunger+"<br>Coins: "+data.coins+"<br>Mood: "+data.mood+"<br>Evolution: "+data.evo+"<br>Streak: "+data.streak;
  }catch{}
}

function setName(){ let n=document.getElementById('nameInput').value; if(n) sendCommand('NAME:'+n); }
function talk(){ let t=prompt("Say something"); if(t) sendCommand('TALK:'+t); }
function gift(){ let id=parseInt(prompt("Enter gift 1-3")); if(id) sendCommand('GIFT:'+id); }
function playGame(){ 
  sendCommand('PLAY');
  let start=Date.now();
  alert("Tap OK quickly!");
  let diff=(Date.now()-start);
  if(diff<2000) sendCommand('MINIGAME:SUCCESS'); else sendCommand('MINIGAME:FAIL');
}
</script>
</body>
</html>
